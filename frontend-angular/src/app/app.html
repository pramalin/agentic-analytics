<div style="padding: 40px; font-family: sans-serif;">
  <h1>Engineering Console — connectivity check</h1>

  <input #questionInput type="text" style="width: 500px;"
         value="How many total transactions are declined, across all time?" />
  <button (click)="ask(questionInput.value)" style="margin-left: 10px;">Ask</button>

  @if (error()) {
    <p style="color: red;">Error: {{ error() }}</p>
  }

  @if (result()) {
    <h3>Answer</h3>
    <p>{{ result()!.answer }}</p>

    <h3>Traces ({{ result()!.traces.length }})</h3>
    <pre>{{ result()!.traces | json }}</pre>
  }
</div>
