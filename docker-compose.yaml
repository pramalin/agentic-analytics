services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: datamart
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # backend:            <- added in the step where we scaffold the Spring Boot app
  # frontend-react:     <- added once the React UI exists (profile: react)
  # frontend-angular:   <- added once the Angular UI exists (profile: angular)

volumes:
  pgdata:
